<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pase de Lista</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="contenedor">

    <!-- ENCABEZADO -->
    <div class="encabezado">

      <img src="logouaem.png" alt="Logo UAEM" class="logo-izq">

      <div class="titulo">
        <h1>Universidad Autónoma del Estado de Morelos</h1>
        <h2>Facultad de Contabilidad, Administración e Informática</h2>
      </div>

      <img src="logofcaei.png" alt="Logo FCAeI" class="logo-der">

    </div>

    <!-- INFORMACIÓN -->
    <div class="info-materia">
      <p><strong>Docente:</strong> Kevin Alquicira Hernandez</p>
      <p><strong>Materia:</strong> INTRODUCCIÓN A LA INVESTIGACIÓN</p>
    </div>

    <!-- FORMULARIO -->
    <input
      type="text"
      id="matriculaAlumno"
      placeholder="Ingresa tu matrícula"
    >

    <input
      type="text"
      id="nombreAlumno"
      placeholder="Ingresa tu nombre"
    >

    <div class="botones">

      <button onclick="pasarLista()">
        Pasar Lista
      </button>

      <button
        class="btnEliminarGeneral"
        onclick="limpiarLista()">
        Limpiar Lista
      </button>

    </div>

    <h3 id="contador">
      Alumnos presentes: 0
    </h3>

    <ul id="listaAlumnos"></ul>

  </div>

  <script>

    let contadorAlumnos = 0;

    function pasarLista() {

      let matricula =
        document.getElementById("matriculaAlumno").value;

      let nombre =
        document.getElementById("nombreAlumno").value;

      if (matricula.trim() === "") {
        alert("Por favor escribe tu matrícula");
        return;
      }

      if (nombre.trim() === "") {
        alert("Por favor escribe tu nombre");
        return;
      }

      let lista =
        document.getElementById("listaAlumnos");

      let nuevoAlumno =
        document.createElement("li");

      let fecha = new Date();

      let fechaActual =
        fecha.toLocaleDateString();

      let horaActual =
        fecha.toLocaleTimeString();

      nuevoAlumno.innerHTML =
        "<span>" +
        "<strong>Matrícula:</strong> " + matricula +
        " | <strong>Nombre:</strong> " + nombre +
        " | <strong>Fecha:</strong> " + fechaActual +
        " | <strong>Hora:</strong> " + horaActual +
        "</span>";

      let btnEliminar =
        document.createElement("button");

      btnEliminar.textContent = "Eliminar";
      btnEliminar.classList.add("btnEliminar");

      btnEliminar.onclick = function () {

        lista.removeChild(nuevoAlumno);

        contadorAlumnos--;

        document.getElementById("contador").textContent =
          "Alumnos presentes: " + contadorAlumnos;
      };

      nuevoAlumno.appendChild(btnEliminar);

      lista.appendChild(nuevoAlumno);

      contadorAlumnos++;

      document.getElementById("contador").textContent =
        "Alumnos presentes: " + contadorAlumnos;

      document.getElementById("matriculaAlumno").value = "";
      document.getElementById("nombreAlumno").value = "";
    }

    function limpiarLista() {

      document.getElementById("listaAlumnos").innerHTML = "";

      contadorAlumnos = 0;

      document.getElementById("contador").textContent =
        "Alumnos presentes: 0";
    }

  </script>

</body>
</html>
