<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pase de Lista</title>

<style>

  /* FONDO DE LA PÁGINA */
  body{
    margin:0;
    padding:20px;
    font-family:Arial, sans-serif;

    background-image:url("fcaei.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
  }

  /* CONTENEDOR PRINCIPAL */
  .contenedor{
    max-width:1200px;
    margin:auto;

    background:rgba(255,255,255,0.90);
    backdrop-filter:blur(8px);

    padding:25px;
    border-radius:15px;

    box-shadow:0 5px 20px rgba(0,0,0,0.3);
  }

  /* ENCABEZADO */
  .encabezado{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;

    border-bottom:3px solid #0b4f8a;
    padding-bottom:15px;
    margin-bottom:20px;
  }

  .titulo{
    text-align:center;
    flex:1;
  }

  .titulo h1{
    margin:0;
    color:#0b4f8a;
  }

  .titulo h2{
    margin:5px 0 0;
    color:#444;
  }

  .logo-izq,
  .logo-der{
    width:100px;
    height:auto;
  }

  /* INFORMACIÓN */
  .info-materia{
    background:#eaf3ff;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
  }

  .info-materia p{
    margin:5px 0;
  }

  /* INPUTS */
  input{
    width:100%;
    padding:12px;
    margin-bottom:12px;

    border:1px solid #ccc;
    border-radius:8px;

    box-sizing:border-box;
  }

  /* BOTONES */
  .botones{
    display:flex;
    gap:10px;
    margin-bottom:20px;
  }

  button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
  }

  button:hover{
    opacity:0.9;
  }

  .btnEliminarGeneral{
    background:#d32f2f;
    color:white;
  }

  .botones button:first-child{
    background:#0b4f8a;
    color:white;
  }

  .btnEliminar{
    background:#d32f2f;
    color:white;
    padding:8px 15px;
  }

  /* CONTADOR */
  #contador{
    color:#0b4f8a;
  }

  /* TABLA */
  table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
  }

  th,
  td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
  }

  th{
    background:#0b4f8a;
    color:white;
  }

  tr:nth-child(even){
    background:#f5f5f5;
  }

</style>
</head>

<body>

<div class="contenedor">

  <!-- ENCABEZADO -->
  <div class="encabezado">

    <img src="logouaem.png" alt="Logo UAEM" class="logo-izq">

    <div class="titulo">
      <h1>Universidad Autónoma del Estado de Morelos</h1>
      <h2>Facultad de Contabilidad, Administración e Informática</h2>
    </div>

    <img src="logofcaei.png" alt="Logo FCAeI" class="logo-der">

  </div>

  <!-- INFORMACIÓN -->
  <div class="info-materia">
    <p><strong>Docente:</strong> Kevin Alquicira Hernandez</p>
    <p><strong>Materia:</strong> INTRODUCCIÓN A LA INVESTIGACIÓN</p>
  </div>

  <!-- FORMULARIO -->
  <input
    type="text"
    id="matriculaAlumno"
    placeholder="Ingresa tu matrícula">

  <input
    type="text"
    id="nombreAlumno"
    placeholder="Ingresa tu nombre">

  <div class="botones">

    <button onclick="pasarLista()">
      Pasar Lista
    </button>

    <button
      class="btnEliminarGeneral"
      onclick="limpiarLista()">
      Limpiar Lista
    </button>

  </div>

  <h3 id="contador">
    Alumnos presentes: 0
  </h3>

  <!-- TABLA -->
  <table id="tablaAsistencia">

    <thead>
      <tr>
        <th>Matrícula</th>
        <th>Nombre</th>
        <th>Fecha</th>
        <th>Hora</th>
        <th>Acción</th>
      </tr>
    </thead>

    <tbody id="cuerpoTabla">
    </tbody>

  </table>

</div>

<script>

let contadorAlumnos = 0;

function pasarLista() {

  let matricula =
    document.getElementById("matriculaAlumno").value;

  let nombre =
    document.getElementById("nombreAlumno").value;

  if (matricula.trim() === "") {
    alert("Por favor escribe tu matrícula");
    return;
  }

  if (nombre.trim() === "") {
    alert("Por favor escribe tu nombre");
    return;
  }

  let cuerpoTabla =
    document.getElementById("cuerpoTabla");

  let fila =
    document.createElement("tr");

  let fecha = new Date();

  let fechaActual =
    fecha.toLocaleDateString();

  let horaActual =
    fecha.toLocaleTimeString();

  fila.innerHTML =
    "<td>" + matricula + "</td>" +
    "<td>" + nombre + "</td>" +
    "<td>" + fechaActual + "</td>" +
    "<td>" + horaActual + "</td>";

  let celdaAccion =
    document.createElement("td");

  let btnEliminar =
    document.createElement("button");

  btnEliminar.textContent = "Eliminar";

  btnEliminar.classList.add("btnEliminar");

  btnEliminar.onclick = function () {

    cuerpoTabla.removeChild(fila);

    contadorAlumnos--;

    document.getElementById("contador").textContent =
      "Alumnos presentes: " + contadorAlumnos;
  };

  celdaAccion.appendChild(btnEliminar);

  fila.appendChild(celdaAccion);

  cuerpoTabla.appendChild(fila);

  contadorAlumnos++;

  document.getElementById("contador").textContent =
    "Alumnos presentes: " + contadorAlumnos;

  document.getElementById("matriculaAlumno").value = "";
  document.getElementById("nombreAlumno").value = "";
}

function limpiarLista() {

  document.getElementById("cuerpoTabla").innerHTML = "";

  contadorAlumnos = 0;

  document.getElementById("contador").textContent =
    "Alumnos presentes: 0";
}

</script>

</body>
</html>
