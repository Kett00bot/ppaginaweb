<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pase de Lista</title>

  <!-- CONEXIÓN AL CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="contenedor">

    <!-- AQUÍ VAN LOS LOGOS -->
    <div class="logos">
      <img src="logouaem.png" alt="Logo UAEM">
      <img src="logofcaei.png" alt="Logo FCAeI">
    </div>

    <h1>Universidad Autónoma del Estado de Morelos</h1>

    <h2>Facultad de Contabilidad, Administración e Informática</h2>

    <h3>Clase: Base de Datos</h3>

    <input type="text" id="nombreAlumno" placeholder="Ingresa tu nombre">

    <button onclick="pasarLista()">Pasar Lista</button>

    <!-- BOTÓN ROJO -->
    <button class="btnEliminar" onclick="limpiarLista()">
      Limpiar Lista
    </button>


    <!-- NUEVO: CONTADOR -->
    <h3 id="contador">
      Alumnos presentes: 0
    </h3>


    <ul id="listaAlumnos"></ul>

  </div>

  <script>

    // NUEVO: VARIABLE CONTADOR

    let contadorAlumnos = 0;


    function pasarLista() {

      let nombre = document.getElementById("nombreAlumno").value;

      if(nombre.trim() === ""){
        alert("Por favor escribe tu nombre");
        return;
      }

      let lista = document.getElementById("listaAlumnos");

      let nuevoAlumno = document.createElement("li");


      // OBTENER FECHA Y HORA

      let fecha = new Date();

      let fechaActual =
      fecha.toLocaleDateString();

      let horaActual =
      fecha.toLocaleTimeString();


      // MOSTRAR FECHA Y HORA

      nuevoAlumno.textContent =
      "✔ " + nombre +
      " | " + fechaActual +
      " | " + horaActual;


      lista.appendChild(nuevoAlumno);


      // NUEVO: AUMENTAR CONTADOR

      contadorAlumnos++;


      // NUEVO: ACTUALIZAR TEXTO

      document.getElementById("contador").textContent =
      "Alumnos presentes: " + contadorAlumnos;


      document.getElementById("nombreAlumno").value = "";
    }


    // FUNCIÓN PARA LIMPIAR LISTA

    function limpiarLista(){

      let lista = document.getElementById("listaAlumnos");

      lista.innerHTML = "";


      // NUEVO: REINICIAR CONTADOR

      contadorAlumnos = 0;


      // NUEVO: ACTUALIZAR CONTADOR

      document.getElementById("contador").textContent =
      "Alumnos presentes: 0";

    }

  </script>

</body>
</html>
