<body>

<!-- ENCABEZADO -->

<input
  type="text"
  id="matriculaAlumno"

>

<input
  type="text"
  id="nombreAlumno"
  placeholder="Ingresa tu nombre"
>

<div class="botones">

  <button onclick="pasarLista()">
    Pasar Lista
  </button>

  <button
    class="btnEliminarGeneral"

  </button>

<h3 id="contador">
  Alumnos presentes: 0
</h3>

<!-- TABLA DE ASISTENCIA -->
<table id="tablaAsistencia">

  <thead>
    <tr>
      <th>Matrícula</th>
      <th>Nombre</th>
      <th>Fecha</th>
      <th>Hora</th>
      <th>Acción</th>
    </tr>
  </thead>

  <tbody id="cuerpoTabla">
  </tbody>

```

  </div>

  <script>

    let contadorAlumnos = 0;

    function pasarLista() {

      let matricula =
        document.getElementById("matriculaAlumno").value;

      let nombre =
        document.getElementById("nombreAlumno").value;

      if (matricula.trim() === "") {
        alert("Por favor escribe tu matrícula");
        return;
      }

      if (nombre.trim() === "") {
        alert("Por favor escribe tu nombre");
        return;
      }

      let cuerpoTabla =
        document.getElementById("cuerpoTabla");

      let fila =
        document.createElement("tr");

      let fecha = new Date();

      let fechaActual =
        fecha.toLocaleDateString();

      let horaActual =
        fecha.toLocaleTimeString();

      fila.innerHTML =
        "<td>" + matricula + "</td>" +
        "<td>" + nombre + "</td>" +
        "<td>" + fechaActual + "</td>" +
        "<td>" + horaActual + "</td>";

      let celdaAccion =
        document.createElement("td");

      let btnEliminar =
        document.createElement("button");

      btnEliminar.textContent = "Eliminar";
      btnEliminar.classList.add("btnEliminar");

      btnEliminar.onclick = function () {

        cuerpoTabla.removeChild(fila);

        contadorAlumnos--;

        document.getElementById("contador").textContent =
          "Alumnos presentes: " + contadorAlumnos;
      };

      celdaAccion.appendChild(btnEliminar);

      fila.appendChild(celdaAccion);

      cuerpoTabla.appendChild(fila);

      contadorAlumnos++;

      document.getElementById("contador").textContent =
        "Alumnos presentes: " + contadorAlumnos;

      document.getElementById("matriculaAlumno").value = "";
      document.getElementById("nombreAlumno").value = "";
    }

    function limpiarLista() {

      document.getElementById("cuerpoTabla").innerHTML = "";

      contadorAlumnos = 0;

      document.getElementById("contador").textContent =
        "Alumnos presentes: 0";
    }

  </script>

</body>
</html>
